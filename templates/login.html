{% extends "base.html" %}
{% block title %}Login - KdramaShows{% endblock %}
{% block content %}

<section class="py-5 mt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 bg-dark-subtle p-4">
                    <div class="card-body">
                        <h3 class="fw-bold text-center mb-4">Welcome Back</h3>
                        {% if error %}
                        <div class="alert alert-danger py-2">{{ error }}</div>
                        {% endif %}
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-kdrama w-100 mb-3">Login</button>
                            <p class="text-center text-muted small mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-kdrama">Register</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
